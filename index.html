<!DOCTYPE html>

<html lang="en">

<head>
    <meta property="og:title" content="PulseBox" />
    <meta property="og:description"
        content="PulseBox is an online tool for sketching and sharing instrumental(?) music." />
    <meta property="og:image" content="favicon.ico" />
    <meta property="og:url" content="https://mitvteo.github.io/pulsebox/" />
    <meta property="og:type" content="website" />

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">

    <style>
        :root {
            --shadow: #00000044;
            --topbar: #222;
            --topbar-buttons: #333;
            --topbar-button-text: #fff;
            --bg: #111;
            --sidebar-bg: #181818;
            --pattern-text: #fff;
            --sb-track-color: #111;
            --sb-thumb-color: #8884;
            --sb-thumb-color-hover: #8888;
            --sb-size: 12px;

            --top: 0;
            --left: 0;
        }

        @supports (-moz-appearance: none) {
            * {
                scrollbar-width: thin;
                scrollbar-color: var(--sb-thumb-color) var(--sb-track-color);
            }
        }

        /* other browsers */
        *::-webkit-scrollbar {
            height: 12px;
            width: 12px;
        }

        *::-webkit-scrollbar-track {
            border-radius: 0;
            background-color: var(--sb-track-color);
        }

        *::-webkit-scrollbar-track:hover {
            background-color: var(--sb-track-color);
        }

        *::-webkit-scrollbar-track:active {
            background-color: var(--sb-track-color);
        }

        *::-webkit-scrollbar-thumb {
            border-radius: 0;
            background-color: var(--sb-thumb-color);
        }

        *::-webkit-scrollbar-thumb:hover {
            background-color: var(--sb-thumb-color-hover);
        }

        *::-webkit-scrollbar-thumb:active {
            background-color: var(--sb-thumb-color-hover);
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            overflow: hidden;
        }

        nav {
            height: 2rem;
            display: flex;
            align-items: center;
            background-color: var(--topbar);
            padding: 0.5rem;
            box-shadow: 0 2px 12px var(--shadow);
            width: 100%;
        }

        nav a {
            cursor: pointer;
            background-color: var(--topbar-buttons);
            color: var(--topbar-button-text);
            padding-bottom: 0.25rem;
            padding-top: 0.25rem;
            margin-right: 0.5rem;
            text-align: center;
            border-radius: 0.5rem;
            box-shadow: 0 2px 12px var(--shadow);

            width: 10rem;
        }

        #main {
            width: calc(100vw - 2rem);
            height: calc(100vh - 1.5rem);
            display: flex;
            flex-direction: column;
        }

        #app {
            display: flex;
            flex-direction: column;
            width: 100vw;
            height: 100vh;
        }

        #prefabs {
            display: none;
            pointer-events: none;
        }

        #channel,
        #notes {
            flex-grow: 1;

        }

        #channel {
            display: flex;
            height: 0;
        }

        #patterns {
            background-color: var(--sidebar-bg);
            height: 40%;
            padding: 1rem;
            margin-bottom: 1rem;
            overflow-y: auto;
            overflow-x: auto;
            position: relative;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        #channelSettings {
            background-color: var(--sidebar-bg);
            width: 30%;
        }

        .channel-patterns {
            display: flex;
            height: 4rem;
        }

        .channel-patterns .pattern {
            width: 6rem;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--channel-color);
            opacity: 0.2;
        }

        .channel-patterns .pattern:has(*) {
            background-color: #222;
            border: 1px solid #1118;
            opacity: 1;
        }

        .channel-patterns .pattern p {
            margin: 0;
            padding: 0 0 0 0.5rem;
            background-color: var(--channel-color);
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--pattern-text);
        }

        .channel-patterns .pattern img {
            width: 100%;
            flex-grow: 1;
            height: 0;
            border: none;
            object-fit: fill;
        }

        .channel-patterns .pattern p::before {
            content: "Pattern ";
            font-weight: normal;
        }

        * {
            image-rendering: pixelated;
        }

        #playhead {
            z-index: 10;
            width: 2px;
            height: 4rem;
            position: absolute;
            top: 1rem;
            background-color: #fff;
            box-shadow: 0 0 6px #fff8;
        }

        #oscContainer {
            margin: 0;
            height: 2.5rem;
            aspect-ratio: 8 / 1;
            position: absolute;
            right: 0;
            top: 0;
            background-color: #333333;
            border-left: 2px solid #888;
            border-bottom: 2px solid #888;
            box-shadow: 0 2px 12px var(--shadow);
        }

        .limiter {
            position: absolute;
            margin: 0;
            right: 0;
            top: 2.5rem;
            width: 2rem;
            bottom: 0;
            height: calc(100vh - 2.5rem);
            overflow: hidden;
        }

        #limiterDuck {
            position: absolute;
            width: 1rem;
            height: 0%;
            background-color: #ffbb22;
        }

        #limiterOutput {
            position: absolute;
            margin-left: 1rem;
            bottom: 0;
            width: 1rem;
            height: 0%;
            background-color: #00ff00;
            transition: background-color 0.05s ease-out;
        }

        #limiterText div {
            height: 1rem;
            font-size: 1rem;
            transform: rotateZ(90deg);
            text-align: center;

            color: #fff;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px #000000;
            font-weight: 600;
        }

        #limiterDuckText {
            position: absolute;
            width: 1rem;
        }

        #limiterOutputText {
            position: absolute;
            margin-left: 1rem;
            width: 1rem;
        }

        @keyframes active {
            from {
                filter: brightness(2.5);
            }

            to {
                filter: brightness(1.2);
            }
        }

        @keyframes inactive {
            from {
                filter: brightness(1.2);
            }

            to {
                filter: brightness(1);
            }
        }

        .pattern {
            animation: inactive 0.5s cubic-bezier(0.215, 0.610, 0.355, 1);
            filter: brightness(1);
        }

        .pattern:has(.active) {
            animation: active 0.5s cubic-bezier(0.215, 0.610, 0.355, 1);
            filter: brightness(1.2);
        }

        .muted {
            opacity: 0.2;
        }

        #contextmenuContainer {
            background: #00000000;
            pointer-events: none;

            transition: background 0.2s ease-out;

            z-index: 999999;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
        }

        #contextmenuContainer.visible {
            background: #00000011;
            pointer-events: auto;
            display: inline-block;
        }

        #contextmenu {
            position: absolute;

            background: #11111188;
            padding: 0.5rem 0;
            border-radius: 0.5rem;
            border: 1px solid #88888888;

            transform: translateY(-1rem) translateX(-1rem) scale(0.8);
            opacity: 0;
            top: var(--top);
            left: var(--left);

            backdrop-filter: blur(4px);

            user-select: none;
            -moz-user-select: none;

            transition: transform 0.2s ease-out, opacity 0.2s ease-out;
        }
        #contextmenuContainer.visible #contextmenu {
            transform: translateY(0) translateX(0) scale(1);
            opacity: 1;
        }

        #contextmenuContainer .disabled {
            color: #888;
        }

        #contextmenu li {
            list-style-type: none;
            padding: 0.1rem 1.5rem;
            color: #fff;
            display: flex;
        }
        #contextmenu li:not(:has(b)) {
            cursor: pointer;
            transition: background 0.1s ease-out;
        }
        #contextmenu li:has(b) {
            justify-content: center;
        }

        #contextmenu li:not(:has(b)):hover {
            background: #ffffff22;
        }

        #contextmenu li.disabled {
            cursor: not-allowed;
        }
    </style>

    <link rel="stylesheet" href="svgs.css">
    <link id="favicon" rel="icon" href="favicon.ico" type="image/png">

    <script src="xxhash.js"></script>
    <script src="modulators.js"></script>
    <script src="main.js" type="module" defer></script>
</head>

<body>
    <div id="contextmenuContainer" onclick="closeContextMenu();" oncontextmenu="closeContextMenu(); event.preventDefault();">
        <ul id="contextmenu"></ul>
    </div>
    <div id="app">
        <nav id="topbar">
            <a id="topbar-file">File</a>
            <a id="topbar-file">Edit</a>
            <a id="topbar-file">Preferences</a>

            <div id="oscContainer">
                <canvas id="osc">

                </canvas>
            </div>
        </nav>
        <div id="main">
            <div id="channel">
                <div id="notes">
                    <canvas id="notes-canvas">

                    </canvas>
                </div>
                <div id="channelSettings">
                </div>
            </div>
            <div id="patterns">
                <div id="patterns-auto">
                </div>
                <div id="playhead">

                </div>
            </div>
        </div>
        <div class="limiter" id="limiter">
            <div id="limiterDuck"></div>
            <div id="limiterOutput"></div>
        </div>
        <div class="limiter" id="limiterText">
            <div id="limiterDuckText">0</div>
            <div id="limiterOutputText">0</div>
        </div>
    </div>
</body>

</html>
