<!DOCTYPE html>

<html lang="en">

<head>
    <meta property="og:title" content="PulseBox" />
    <meta property="og:description"
        content="PulseBox is an online tool for sketching and sharing instrumental(?) music." />
    <meta property="og:image" content="favicon.ico" />
    <meta property="og:url" content="https://mitvteo.github.io/pulsebox/" />
    <meta property="og:type" content="website" />

    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">

    <link rel="stylesheet" href="svgs.css">
    <link id="favicon" rel="icon" href="favicon.ico" type="image/png">

    <script src="xxhash.js"></script>
    <script src="main.js" type="module" defer></script>
</head>

<body>
    <div id="contextmenuContainer" onclick="closeContextMenu();" oncontextmenu="closeContextMenu(); event.preventDefault();">
        <ul id="contextmenu"></ul>
    </div>
    <div id="app">
        <nav id="topbar">
            <a id="topbar-file">File</a>
            <a id="topbar-file">Edit</a>
            <a id="topbar-file">Preferences</a>

            <div id="oscContainer">
                <canvas id="osc">

                </canvas>
            </div>
        </nav>
        <div id="main">
            <div id="channel">
                <div id="notes">
                    <canvas id="notes-canvas">

                    </canvas>
                </div>
                <div id="channelSettings">
                </div>
            </div>
            <div id="patterns">
                <div id="patterns-auto">
                </div>
                <div id="playhead">

                </div>
            </div>
        </div>
        <div class="limiter" id="limiter">
            <div id="limiterDuck"></div>
            <div id="limiterOutput"></div>
        </div>
        <div class="limiter" id="limiterText">
            <div id="limiterDuckText">0</div>
            <div id="limiterOutputText">0</div>
        </div>
    </div>
</body>

</html>
